name: PR Preview

on:
    workflow_call:
        inputs:
            action:
                required: true
                type: string
                description: "'deploy' or 'teardown'"
            image_tag:
                required: false
                type: string
                description: "image tag to deploy (only needed for deploy)"
        secrets:
            SSH_PRIVATE_KEY:
                required: true
            SSH_USER:
                required: true
            SSH_HOST_PREVIEW:
                required: true
            GHCR_USER:
                required: true
            GHCR_TOKEN:
                required: true

permissions:
    contents: read
    pull-requests: write

jobs:
    preview:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Get PR number
              id: pr
              run: |
                  echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
                  echo "stack_name=preview-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
                  echo "host=pr-${{ github.event.pull_request.number }}.preview.pubstar.org" >> $GITHUB_OUTPUT

            - name: Start SSH agent
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Add known hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H "${{ secrets.SSH_HOST_PREVIEW }}" >> ~/.ssh/known_hosts

            - name: Deploy preview stack
              if: inputs.action == 'deploy'
              env:
                  SSH_USER: ${{ secrets.SSH_USER }}
                  SSH_HOST: ${{ secrets.SSH_HOST_PREVIEW }}
                  REPO: ${{ github.repository }}
                  BRANCH: ${{ github.head_ref }}
                  GHCR_USER: ${{ secrets.GHCR_USER }}
                  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                  IMAGE_TAG: ${{ inputs.image_tag }}
                  STACK_NAME: ${{ steps.pr.outputs.stack_name }}
                  PREVIEW_HOST: ${{steps.pr.outputs.host }}
                  PR_NUMBER: ${{ steps.pr.outputs.number }}
              run: |
                  ssh "${SSH_USER}@${SSH_HOST}" \
                    "env GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' IMAGE_TAG='${IMAGE_TAG}' STACK_NAME='${STACK_NAME}' PREVIEW_HOST='${PREVIEW_HOST}' PR_NUMBER='${PR_NUMBER}' bash -s -- '${REPO}' '${BRANCH}'" <<'EOS'
                    set -euo pipefail

                    REPO="${1:?missing repo}"
                    BRANCH="${2:-main}"

                    : "${IMAGE_TAG:?missing IMAGE_TAG}"
                    : "${GHCR_USER:?missing GHCR_USER}"
                    : "${GHCR_TOKEN:?missing GHCR_TOKEN}"
                    : "${STACK_NAME:?missing STACK_NAME}"
                    : "${PREVIEW_HOST:?missing PREVIEW_HOST}"
                    : "${PR_NUMBER:?missing PR_NUMBER}"

                    REPO_NAME="${REPO##*/}"
                    APP_DIR="/srv/${REPO_NAME}"
                    REPO_SSH="git@github.com:${REPO}.git"

                    ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
                    chmod 600 ~/.ssh/known_hosts

                    if [[ ! -d "${APP_DIR}/.git" ]]; then
                      sudo mkdir -p "${APP_DIR}"
                      sudo chown -R "$USER:$USER" "${APP_DIR}"
                      git clone --branch "${BRANCH}" "${REPO_SSH}" "${APP_DIR}"
                    fi

                    cd "${APP_DIR}"
                    git fetch --prune origin
                    git checkout "origin/${BRANCH}" --detach

                    cd infra

                    if ! sudo docker info --format '{{.Swarm.LocalNodeState}}' | grep -qx active; then
                      sudo docker swarm init --advertise-addr "$(hostname -I | awk '{print $1}')"
                    fi

                    echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

                    echo "deploying preview stack $STACK_NAME with IMAGE_TAG=$IMAGE_TAG at $PREVIEW_HOST"

                    sudo env IMAGE_TAG="$IMAGE_TAG" PREVIEW_HOST="$PREVIEW_HOST" \
                      docker stack deploy -c stack.preview.yml \
                      --with-registry-auth --resolve-image always \
                      "$STACK_NAME"

                    sudo docker stack services "$STACK_NAME"
                    sudo docker image prune -f

                  EOS

            - name: Teardown preview stack
              if: inputs.action == 'teardown'
              env:
                  SSH_USER: ${{ secrets.SSH_USER }}
                  SSH_HOST: ${{ secrets.SSH_HOST_PREVIEW }}
                  STACK_NAME: ${{ steps.pr.outputs.stack_name }}
              run: |
                  ssh "${SSH_USER}@${SSH_HOST}" \
                    "env STACK_NAME='${STACK_NAME}' bash -s" <<'EOS'
                    set -euo pipefail
                    : "${STACK_NAME:?missing STACK_NAME}"

                    echo "tearing down preview stack $STACK_NAME"

                    if sudo docker stack ls --format '{{.Name}}' | grep -qx "$STACK_NAME"; then
                      sudo docker stack rm "$STACK_NAME"
                      sleep 10
                      # prune volumes for this stack
                      sudo docker volume ls --filter "label=com.docker.stack.namespace=$STACK_NAME" -q \
                        | xargs -r sudo docker volume rm || true
                      echo "stack $STACK_NAME removed"
                    else
                      echo "stack $STACK_NAME not found, nothing to tear down"
                    fi

                    sudo docker image prune -f

                  EOS

            - name: Comment on PR
              if: inputs.action == 'deploy'
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = `Preview deployed at https://${{ steps.pr.outputs.host }}`;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: ${{ steps.pr.outputs.number }},
                      });
                      const existing = comments.find(c => c.body.includes('Preview deployed at'));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: ${{ steps.pr.outputs.number }},
                          body,
                        });
                      }
