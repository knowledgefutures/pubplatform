name: docker build to GHCR

on:
  workflow_call:
    inputs:
      publish_latest:
        type: boolean
        default: false
      image_tag:
        type: string
        description: "Override the image tag (e.g. v1.2.3). Falls back to git describe."
    outputs:
      core-image:
        description: 'Core image ref'
        value: ${{ jobs.build-core.outputs.image-sha }}
      jobs-image:
        description: 'Jobs image ref'
        value: ${{ jobs.build-jobs.outputs.image-sha }}
      site-builder-image:
        description: 'Site builder image ref'
        value: ${{ jobs.build-site-builder.outputs.image-sha }}
      coar-server-image:
        description: 'Coar server image ref'
        value: ${{ jobs.build-coar-server.outputs.image-sha }}
    secrets:
      SENTRY_AUTH_TOKEN:
        required: true

jobs:
  build-core:
    uses: ./.github/workflows/ghcr-build-template.yml
    with:
      package: core
      ghcr_image_name: platform
      publish_latest: ${{ inputs.publish_latest }}
      image_tag: ${{ inputs.image_tag }}
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  build-jobs:
    uses: ./.github/workflows/ghcr-build-template.yml
    with:
      package: jobs
      target: jobs
      ghcr_image_name: platform-jobs
      publish_latest: ${{ inputs.publish_latest }}
      image_tag: ${{ inputs.image_tag }}
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  build-site-builder:
    uses: ./.github/workflows/ghcr-build-template.yml
    with:
      package: site-builder-2
      target: jobs
      ghcr_image_name: platform-site-builder
      publish_latest: ${{ inputs.publish_latest }}
      image_tag: ${{ inputs.image_tag }}
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    
  build-coar-server:
    uses: ./.github/workflows/ghcr-build-template.yml
    with:
      package: mock-notify
      ghcr_image_name: mock-coar-notify-server
      publish_latest: ${{ inputs.publish_latest }}
      image_tag: ${{ inputs.image_tag }}
    secrets:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}