    #         - name: Close docs preview
    #           uses: rossjrw/pr-preview-action@v1
    #           with:
    #               source-dir: docs/out
    #               action: remove

    status-check:
        needs:
            - ci
            - e2e
        runs-on: ubuntu-latest
        steps:
            - name: ok
              run: |
                  echo ok
